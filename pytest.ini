[pytest]
addopts = -m "not integration_slow and not e2e_dvwa"
markers =
    docker: requires local Docker daemon and prebuilt sandbox image
    integration: integration tests that may exercise subprocesses or external services
    integration_slow: slow integration tests that require external runtimes (chromium launch, etc.); skipped by default
    e2e_dvwa: requires live DVWA at DVWA_BASE_URL (default http://127.0.0.1:4280); skipped by default, see compose/e2e_dvwa.yml
# DVWA E2E compose stack — used by the opt-in ``e2e_dvwa`` pytest suite.
#
# Usage:
#     docker compose -f compose/e2e_dvwa.yml up -d
#     pytest -m e2e_dvwa tests/integration/e2e/ -o addopts=
#     docker compose -f compose/e2e_dvwa.yml down -v
#
# The DVWA HTTP port is bound to ``127.0.0.1:4280`` to match the default
# ``DVWA_BASE_URL`` expected by ``tests/integration/e2e/conftest.py``.
# The ``db`` service stays on the internal compose network only.
#
# Image pin policy:
#   Both images are referenced by ``<repo>@sha256:<DIGEST_TBD>`` placeholders.
#   For reproducible CI / golden-trace comparison, resolve digests locally
#   (requires outbound registry access, so it is NOT done in-tree):
#     docker pull ghcr.io/digininja/dvwa:latest
#     docker inspect --format '{{index .RepoDigests 0}}' ghcr.io/digininja/dvwa:latest
#     docker pull docker.io/library/mariadb:10
#     docker inspect --format '{{index .RepoDigests 0}}' docker.io/library/mariadb:10
#   Then replace ``<DIGEST_TBD>`` with the ``sha256:…`` part of the result.
#   Digest bumps are deliberate — revalidate the E2E trio after any bump.
#   Tracked for stage 5 infra closure (see ``docs/roadmap/stage5.md`` §6.1).

services:
  dvwa:
    # TODO stage 5 §6.1: resolve real digest locally via the command above.
    image: ghcr.io/digininja/dvwa@sha256:<DIGEST_TBD>
    ports:
      - "127.0.0.1:4280:80"
    environment:
      DB_SERVER: db
      DB_DATABASE: dvwa
      DB_USERNAME: dvwa
      DB_PASSWORD: p@ssw0rd
      DEFAULT_SECURITY_LEVEL: low
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/login.php"]
      interval: 5s
      timeout: 3s
      retries: 12

  db:
    # TODO stage 5 §6.1: resolve real digest locally via the command above.
    image: docker.io/library/mariadb:10@sha256:<DIGEST_TBD>
    environment:
      MARIADB_ROOT_PASSWORD: dvwa
      MARIADB_DATABASE: dvwa
      MARIADB_USER: dvwa
      MARIADB_PASSWORD: p@ssw0rd
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 3s
      retries: 12
